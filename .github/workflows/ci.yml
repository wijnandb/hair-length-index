name: CI

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
      - "requirements.txt"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
      - "requirements.txt"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - run: python -m pytest tests/ -v --tb=short
