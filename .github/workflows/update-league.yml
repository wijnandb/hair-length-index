name: Update League Data

on:
  workflow_dispatch:
    inputs:
      league:
        description: "League code (DED, PL, BL, SA, LL, L1, JE)"
        required: true
        type: choice
        options: [DED, PL, BL, SA, LL, L1, JE]
  workflow_call:
    inputs:
      league:
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: "update-${{ inputs.league }}"
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      API_FOOTBALL_API_KEY: ${{ secrets.API_FOOTBALL_API_KEY }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Fetch ${{ inputs.league }} match data
        run: python -m scripts.daily_update --league ${{ inputs.league }}

      - name: Fetch ${{ inputs.league }} standings
        if: inputs.league != 'JE'
        run: python -m scripts.fetch_standings --league ${{ inputs.league }}

      - name: Compute ${{ inputs.league }} streaks
        run: |
          LEAGUE="${{ inputs.league }}"
          if [ "$LEAGUE" = "DED" ]; then
            python -m scripts.compute_streaks --league DED --json
          else
            CODE_LOWER=$(echo "$LEAGUE" | tr '[:upper:]' '[:lower:]')
            python -m scripts.compute_streaks --league "$LEAGUE" --json --output "data/hair-index-${CODE_LOWER}.json"
          fi

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hair-index*.json data/standings-*.json data/teams/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update ${{ inputs.league }} data $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
