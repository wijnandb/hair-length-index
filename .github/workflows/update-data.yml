name: Update Hair Length Index

on:
  schedule:
    # Run daily at 06:00 UTC (after most European matches are finished)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Fetch mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - full
      fill_gaps:
        description: "Also run fill_gaps (cup/European data)"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      API_FOOTBALL_API_KEY: ${{ secrets.API_FOOTBALL_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- Data collection (each step independent, failures don't block) ---

      - name: Fetch match data (football-data.org)
        if: env.FOOTBALL_DATA_API_KEY != ''
        continue-on-error: true
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          python -m scripts.fetch_matches --mode "$MODE" --league DED

      - name: Import historical CSV data (football-data.co.uk)
        continue-on-error: true
        run: python -m scripts.import_csv --league DED --start 2003 --end 2024

      - name: Import KNVB Beker (web scrape)
        continue-on-error: true
        run: python -m scripts.import_knvb_beker

      - name: Fill gaps (API-Football)
        if: >-
          github.event.inputs.fill_gaps != 'false'
          && env.API_FOOTBALL_API_KEY != ''
        continue-on-error: true
        run: python -m scripts.fill_gaps --mode fill --league DED

      # --- Processing (always runs with whatever data we have) ---

      - name: Compute Eredivisie streaks
        run: python -m scripts.compute_streaks --league DED --json

      - name: Compute Eerste Divisie streaks
        run: python -m scripts.compute_streaks --league JE --json --output data/hair-index-je.json

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      # --- Commit updated data ---

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/hair-index.json data/hair-index-je.json data/teams/ 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hair-index.json data/hair-index-je.json data/teams/
          git commit -m "Update Hair Length Index data $(date -u +%Y-%m-%d)"
          git push

      # --- Deploy to GitHub Pages (same job, avoids GITHUB_TOKEN trigger limitation) ---

      - name: Prepare site
        run: |
          mkdir -p _site/data/teams
          cp frontend/* _site/
          cp data/hair-index.json data/hair-index-je.json _site/data/
          cp data/teams/*.json _site/data/teams/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
