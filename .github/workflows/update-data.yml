name: Update Hair Length Index

on:
  schedule:
    # Run daily at 06:00 UTC (after most European matches are finished)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      API_FOOTBALL_API_KEY: ${{ secrets.API_FOOTBALL_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- Fetch new matches from APIs into Neon ---

      - name: Fetch new match data
        run: python -m scripts.daily_update

      - name: Fetch league standings
        run: python -m scripts.fetch_standings

      # --- Compute streaks from Neon ---

      - name: Compute Eredivisie streaks
        run: python -m scripts.compute_streaks --league DED --json

      - name: Compute Eerste Divisie streaks
        run: python -m scripts.compute_streaks --league JE --json --output data/hair-index-je.json

      - name: Compute Premier League streaks
        run: python -m scripts.compute_streaks --league PL --json --output data/hair-index-pl.json

      - name: Compute Bundesliga streaks
        run: python -m scripts.compute_streaks --league BL --json --output data/hair-index-bl.json

      - name: Compute La Liga streaks
        run: python -m scripts.compute_streaks --league LL --json --output data/hair-index-ll.json

      - name: Compute Serie A streaks
        run: python -m scripts.compute_streaks --league SA --json --output data/hair-index-sa.json

      - name: Compute Ligue 1 streaks
        run: python -m scripts.compute_streaks --league L1 --json --output data/hair-index-l1.json

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      # --- Commit updated data ---

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/ 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hair-index*.json data/standings-*.json data/teams/
          git commit -m "Update Hair Length Index data $(date -u +%Y-%m-%d)"
          git push

      # --- Deploy to GitHub Pages ---

      - name: Prepare site
        run: |
          mkdir -p _site/data/teams _site/logos
          cp frontend/*.html frontend/*.js frontend/*.css frontend/*.json _site/ 2>/dev/null || true
          cp frontend/logos/*.png _site/logos/ 2>/dev/null || true
          cp data/hair-index*.json _site/data/
          cp data/standings-*.json _site/data/ 2>/dev/null || true
          cp data/fixtures.json _site/data/ 2>/dev/null || true
          cp data/teams/*.json _site/data/teams/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
