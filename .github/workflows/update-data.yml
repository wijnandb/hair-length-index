name: Update Hair Length Index

on:
  schedule:
    # Run daily at 06:00 UTC (after most European matches are finished)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Fetch mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - full
      fill_gaps:
        description: "Also run fill_gaps (cup/European data)"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch match data (football-data.org)
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          python -m scripts.fetch_matches --mode "$MODE" --league DED

      - name: Fill gaps (API-Football)
        if: >-
          github.event.inputs.fill_gaps != 'false'
          && env.API_FOOTBALL_API_KEY != ''
        env:
          API_FOOTBALL_API_KEY: ${{ secrets.API_FOOTBALL_API_KEY }}
        run: python -m scripts.fill_gaps --mode fill --league DED

      - name: Compute streaks and export JSON
        run: python -m scripts.compute_streaks --league DED --json

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/hair-index.json data/hair-index.db 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hair-index.json data/hair-index.db
          git commit -m "Update Hair Length Index data $(date -u +%Y-%m-%d)"
          git push
