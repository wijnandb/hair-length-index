name: Update All Leagues

on:
  schedule:
    # Run daily at 06:00 UTC (after most European matches are finished)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # --- Fetch + compute per league (parallel) ---
  update-ded:
    uses: ./.github/workflows/update-league.yml
    with:
      league: DED
    secrets: inherit

  update-pl:
    uses: ./.github/workflows/update-league.yml
    with:
      league: PL
    secrets: inherit

  update-bl:
    uses: ./.github/workflows/update-league.yml
    with:
      league: BL
    secrets: inherit

  update-sa:
    uses: ./.github/workflows/update-league.yml
    with:
      league: SA
    secrets: inherit

  update-ll:
    uses: ./.github/workflows/update-league.yml
    with:
      league: LL
    secrets: inherit

  update-l1:
    uses: ./.github/workflows/update-league.yml
    with:
      league: L1
    secrets: inherit

  # --- Generate global index + deploy (after all leagues) ---
  deploy:
    needs: [update-ded, update-pl, update-bl, update-sa, update-ll, update-l1]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: "pages"
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main  # Get latest (after league commits)

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Generate global index
        run: |
          python -c "
          import json, glob
          from datetime import datetime
          teams = []
          league_names = {'DED':'Eredivisie','JE':'Eerste Divisie','PL':'Premier League','BL':'Bundesliga','LL':'La Liga','SA':'Serie A','L1':'Ligue 1'}
          league_flags = {'DED':'🇳🇱','JE':'🇳🇱','PL':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','BL':'🇩🇪','LL':'🇪🇸','SA':'🇮🇹','L1':'🇫🇷'}
          for f in sorted(glob.glob('data/hair-index*.json')):
              if 'global' in f or 'prev' in f: continue
              d = json.load(open(f))
              code = f.replace('data/hair-index-','').replace('data/hair-index','DED').replace('.json','').upper()
              if code == 'DED' and 'hair-index.json' in f: code = 'DED'
              for t in d.get('teams',[]):
                  t['league'] = code
                  t['league_name'] = league_names.get(code, code)
                  t['league_flag'] = league_flags.get(code, '')
                  teams.append(t)
          teams.sort(key=lambda x: (0 if not x.get('streak_found') else 1, -(x.get('days_since') or 0)))
          json.dump({'generated_at': datetime.now().isoformat(), 'threshold': 5, 'teams': teams}, open('data/hair-index-global.json','w'), indent=2, ensure_ascii=False)
          print(f'Global index: {len(teams)} teams')
          "

      - name: Export fan data
        run: python -m scripts.export_fan_data

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Commit global data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hair-index-global.json data/fan-data.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update global index $(date -u +%Y-%m-%d)" && git pull --rebase origin main && git push)

      - name: Prepare site
        run: |
          mkdir -p _site/data/teams _site/logos
          cp frontend/*.html frontend/*.js frontend/*.css frontend/*.json _site/ 2>/dev/null || true
          cp frontend/logos/*.png _site/logos/ 2>/dev/null || true
          cp data/hair-index*.json data/fan-data.json _site/data/
          cp data/standings-*.json _site/data/ 2>/dev/null || true
          cp data/fixtures.json _site/data/ 2>/dev/null || true
          cp data/fixtures-*.json _site/data/ 2>/dev/null || true
          cp data/teams/*.json _site/data/teams/ 2>/dev/null || true
          cp -r frontend/jerseys _site/jerseys 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
